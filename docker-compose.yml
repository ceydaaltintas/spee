services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: spee
      POSTGRES_PASSWORD: password
      POSTGRES_DB: spee_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  pgdata:
